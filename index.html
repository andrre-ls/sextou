<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>sextou?</title>
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: Georgia, 'Times New Roman', serif;
        background: #f5f4f0;
        color: #1a1a1a;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .container {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 1.5rem;
      }

      h1 {
        font-size: 1.125rem;
        font-weight: normal;
        letter-spacing: 0;
        color: #1a1a1a;
      }

      .buttons {
        display: flex;
        gap: 1.25rem;
      }

      button {
        font-family: inherit;
        font-size: 0.9375rem;
        font-weight: normal;
        padding: 0;
        border: none;
        background: none;
        color: #6b6b6b;
        cursor: pointer;
        text-decoration: underline;
        text-decoration-color: #c8c5bc;
        text-underline-offset: 3px;
        transition: color 120ms, text-decoration-color 120ms;
      }

      button:hover {
        color: #1a1a1a;
        text-decoration-color: #1a1a1a;
      }

      button:active {
        color: #6b6b6b;
      }

      button:focus-visible {
        outline: 1px solid #9ca3af;
        outline-offset: 3px;
        border-radius: 1px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>sextou?</h1>
      <div class="buttons">
        <button>sim</button>
        <button>não</button>
      </div>
    </div>
  </body>
</html>
