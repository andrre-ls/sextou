<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>sextou?</title>
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: Georgia, 'Times New Roman', serif;
        background: #f5f4f0;
        color: #1a1a1a;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .container {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 1.5rem;
      }

      h1 {
        font-size: 1.125rem;
        font-weight: normal;
        letter-spacing: 0;
        color: #1a1a1a;
      }

      footer {
        position: fixed;
        bottom: 1.5rem;
        left: 50%;
        transform: translateX(-50%);
        font-size: 0.75rem;
        color: #9e9b94;
        white-space: nowrap;
      }

    </style>
  </head>
  <body>
    <div class="container">
      <h1 id="msg"></h1>
    </div>
    <footer>co-created by André Santos &amp; Nuno Craveiro</footer>
    <script>
      document.getElementById('msg').textContent =
        new Date().getDay() === 5 ? 'sextou!' : 'não sextou :(';
    </script>
  </body>
</html>
